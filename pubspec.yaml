name: flutter_google_maps_nav
description: A Flutter app with Google Maps and navigation like Google Maps.

publish_to: "none" 
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.0

  # UI & Styling
  cupertino_icons: 1.0.8

  # Google Maps & Places
  google_maps_flutter: 2.13.1
  google_maps_webservice: ^0.0.20-nullsafety.5
  flutter_polyline_points: ^1.0.0

  flutter_map_marker_cluster: any

  shared_preferences: 2.5.3    # Secure config storage
  crypto: 3.0.6  

  # Location services
  geolocator: ^10.1.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.2

  # Sensors (accelerometer, gyroscope)
  sensors_plus: ^4.0.2

  # Networking (for Google Sheets logging)
  http: ^0.13.6
  share_plus: ^10.1.2

  # Background task scheduler (Android WorkManager)
  workmanager: ^0.6.0
  android_intent_plus: ^5.3.0
  # On-device ML inference
  tflite_flutter: ^0.12.1
  audioplayers: ^5.0.0
  flutter_tts: ^3.5.0

dependency_overrides:
  google_maps_flutter_android: 2.18.2
  google_maps_flutter_platform_interface: 2.14.0
  google_maps_flutter_web: 0.5.14+2
  google_maps_flutter_ios: 2.15.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon/icon_1.png
  adaptive_icon_background: "#0F4C5C"
  adaptive_icon_foreground: assets/app_icon/icon_1.png
  adaptive_icon_monochrome: assets/app_icon/icon_1.png

flutter:
  uses-material-design: true
  assets:
    - lib/accident_prediction/models/cnn_baseline.tflite
    - lib/accident_prediction/models/labels.json
    - assets/alerts/high_risk.mp3
    - assets/alerts/crash_like.mp3
